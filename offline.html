<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Gear Kiosk Offline</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
            color: #0f172a;
        }

        main {
            width: min(100%, 32rem);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid #dbeafe;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 45px rgba(37, 99, 235, 0.12);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.75rem;
        }

        p {
            margin: 0 0 1rem;
            line-height: 1.5;
            color: #334155;
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 0.85rem 1.25rem;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: #2563eb;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <h1>Gear Kiosk is offline</h1>
        <p>This app shell is installed, but the live classroom data still depends on the server. Reconnect to continue managing inventory and checkouts.</p>
        <button type="button" onclick="location.reload()">Try again</button>
    </main>
</body>
</html>
